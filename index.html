<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Licencias digitales originales de Office, Windows, Antivirus y más. Precios inmejorables con garantía real." />
  <meta property="og:title" content="virtualkeys.store" />
  <meta property="og:description" content="Licencias digitales originales — Office · Windows · Antivirus · Software" />
  <meta property="og:image" content="https://cdn.shopify.com/s/files/1/0798/4267/2987/files/vk-logo.png" />
  <meta property="og:url" content="https://links.virtualkeys.store" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="theme-color" content="#f5f5f7" />
  <title>virtualkeys.store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── A. Variables ────────────────────────────────────── */
    :root {
      --bg:          #f5f5f7;
      --card-bg:     #ffffff;
      --accent:      #0071e3;
      --text-primary:#1d1d1f;
      --text-sec:    #86868b;
      --text-muted:  #aeaeb2;
      --border:      rgba(0,0,0,0.06);
      --radius-card: 16px;
      --radius-icon: 10px;
      --font:        "SF Pro Display", Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      --glass:       saturate(180%) blur(20px);
      --spring:      cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ── B. Reset & base ─────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: var(--bg);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── C. Keyframes ────────────────────────────────────── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(0,113,227,0.35); }
      50%      { box-shadow: 0 0 0 10px rgba(0,113,227,0);    }
    }

    /* ── D. Card ─────────────────────────────────────────── */
    .card {
      background: var(--card-bg);
      max-width: 460px;
      width: 100%;
      min-height: 100vh;
      padding: 56px 28px 48px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.04),
        0 20px 60px rgba(0,0,0,0.07);
      display: flex;
      flex-direction: column;
    }

    /* ── E. Header ───────────────────────────────────────── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .avatar-wrap {
      position: relative;
      width: 88px;
      height: 88px;
      opacity: 0;
      animation: slideUp 0.6s var(--spring) 0s forwards;
    }
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(0,113,227,0.35);
      animation: pulse 3s infinite;
      display: block;
    }
    .avatar-fallback {
      display: none;
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: rgba(0,113,227,0.08);
      border: 2px solid rgba(0,113,227,0.35);
      color: var(--accent);
      font-size: 22px;
      font-weight: 700;
      align-items: center;
      justify-content: center;
      animation: pulse 3s infinite;
    }

    .site-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      opacity: 0;
      animation: slideUp 0.6s var(--spring) 0.07s forwards;
    }
    .tagline {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-sec);
      letter-spacing: 0.1px;
      opacity: 0;
      animation: slideUp 0.6s var(--spring) 0.14s forwards;
    }

    /* ── F. Trustpilot badge ─────────────────────────────── */
    .badge {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 999px;
      opacity: 0;
      animation: slideUp 0.6s var(--spring) 0.21s forwards;
      margin-top: 2px;
    }
    .badge-stars {
      height: 18px;
      width: auto;
      display: block;
    }
    .badge-sep {
      width: 1px;
      height: 14px;
      background: rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
    .badge-logo {
      height: 15px;
      width: auto;
      display: block;
    }
    .badge-text {
      font-size: 11.5px;
      color: var(--text-primary);
      white-space: nowrap;
    }
    .badge-text b {
      font-weight: 700;
    }

    /* ── G. Links nav ────────────────────────────────────── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 32px;
    }

    /* ── H. Button base ──────────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: var(--radius-card);
      text-decoration: none;
      transition:
        transform 0.22s var(--spring),
        box-shadow 0.22s var(--spring);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      opacity: 0;
      animation: slideUp 0.6s var(--spring) forwards;
      cursor: pointer;
    }
    .btn-icon {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-icon);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.22s var(--spring);
    }
    .btn:hover .btn-icon {
      transform: scale(1.07);
    }
    .btn-label {
      flex: 1;
      font-size: 15.5px;
      font-weight: 500;
      line-height: 1.2;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .btn-chevron {
      flex-shrink: 0;
      color: var(--text-muted);
      transition:
        transform 0.22s var(--spring),
        color 0.22s ease;
      display: flex;
      align-items: center;
    }

    /* Non-primary hover */
    .btn:not(.btn-primary):hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.07);
    }
    .btn:not(.btn-primary):hover .btn-chevron {
      transform: translateX(3px);
      color: var(--accent);
    }

    /* ── I. Button variants ──────────────────────────────── */

    /* Button 1 — Primary (store) */
    .btn-primary {
      background: var(--accent);
      box-shadow: 0 4px 18px rgba(0,113,227,0.28);
      animation-delay: 0.28s;
    }
    .btn-primary .btn-icon {
      background: rgba(255,255,255,0.18);
    }
    .btn-primary .btn-label {
      color: #ffffff;
    }
    .btn-primary .btn-chevron {
      color: rgba(255,255,255,0.65);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,113,227,0.38);
    }
    .btn-primary:hover .btn-chevron {
      transform: translateX(3px);
      color: #ffffff;
    }

    /* Button 2 — Club VIP */
    .btn-club {
      background: rgba(255,248,230,0.85);
      border: 1.5px solid rgba(175,128,50,0.18);
      animation-delay: 0.35s;
    }
    .btn-club .btn-icon {
      background: rgba(175,128,50,0.12);
    }
    .btn-club .btn-label {
      color: var(--text-primary);
    }

    .vip-badge {
      display: inline-flex;
      align-items: center;
      background: linear-gradient(135deg, #c9a227, #e8c96d);
      color: #ffffff;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 999px;
      margin-left: 7px;
      text-transform: uppercase;
      line-height: 1;
      flex-shrink: 0;
    }

    /* Button 3 — WhatsApp */
    .btn-whatsapp {
      background: rgba(240,255,244,0.85);
      border: 1.5px solid rgba(52,199,89,0.2);
      animation-delay: 0.42s;
    }
    .btn-whatsapp .btn-icon {
      background: rgba(52,199,89,0.12);
    }
    .btn-whatsapp .btn-label {
      color: var(--text-primary);
    }

    /* Button 4 — Ticket */
    .btn-ticket {
      background: rgba(255,255,255,0.85);
      border: 1.5px solid var(--border);
      animation-delay: 0.49s;
    }
    .btn-ticket .btn-icon {
      background: rgba(0,113,227,0.08);
    }
    .btn-ticket .btn-label {
      color: var(--text-primary);
    }

    /* ── J. Footer ───────────────────────────────────────── */
    .footer {
      margin-top: auto;
      padding-top: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      opacity: 0;
      animation: slideUp 0.6s var(--spring) 0.56s forwards;
    }
    .footer-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
      list-style: none;
    }
    .footer-links a {
      font-size: 11px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .footer-links a:hover {
      color: var(--text-primary);
    }
    .footer-copy {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── K. Responsive ───────────────────────────────────── */
    @media (max-width: 479px) {
      .card {
        padding: 44px 20px 40px;
      }
    }
  </style>
</head>
